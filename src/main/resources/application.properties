# URL de conexăo (substitua 'copa_mundo' pelo nome do banco que vocę criou no Workbench)
spring.datasource.url=jdbc:mysql://localhost:3306/copa_mundo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
